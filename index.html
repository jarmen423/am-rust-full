<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Agentic Memory Workspace</title>

    <!-- Trunk: compile the Rust library as WASM -->
    <link data-trunk rel="rust" data-type="main" />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1A1A1A;
            height: 100%;
            width: 100%;
        }
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1A1A1A;
            color: #E8E8E8;
            font-family: system-ui, -apple-system, sans-serif;
            z-index: 10;
        }
        #loading.hidden {
            display: none;
        }
        #loading h1 {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 0 0 0.5rem 0;
        }
        #loading p {
            font-size: 0.875rem;
            color: #909090;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1>Agentic Memory Workspace</h1>
        <p>Loading...</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        // Hide the loading screen once WASM is running
        document.addEventListener("DOMContentLoaded", function() {
            var loading = document.getElementById("loading");
            if (loading) {
                // Hide after a short delay (WASM should be starting)
                setTimeout(function() {
                    loading.classList.add("hidden");
                }, 1500);
            }
        });
    </script>
</body>
</html>
